<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulação Teste MBTI</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
        }
        nav {
            background-color: #4CAF50;
            padding: 10px;
            text-align: center;
            position: absolute;
            top: 0;
            width: 100%;
        }
        nav a {
            color: white;
            text-decoration: none;
            font-size: 20px;
            padding: 0 15px;
        }
        .container {
            text-align: center;
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        h1 {
            font-size: 28px;
            margin-bottom: 20px;
        }
        p {
            font-size: 18px;
            margin-bottom: 30px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 15px 32px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav>
        <a href="{% url 'home' %}">Home</a>
    </nav>

    <!-- Conteúdo principal -->
    <div class="container">
        <h1>Simulação do Teste MBTI</h1>
        <p>Esta é apenas uma simulação do teste MBTI. O verdadeiro teste avalia a personalidade em diversas áreas para sugerir um perfil correspondente.</p>
        <button>Iniciar Simulação</button>
    </div>

</body>
</html>
